name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run regression tests
        run: node --test tests/*.test.cjs
      - name: Check workflow syntax
        run: node --check plugins/goreview/workflow.js
